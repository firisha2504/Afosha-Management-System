name: ams_mobile
description: Afosha Management System - Member Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  http: ^1.2.0
  http_parser: ^4.0.2
  provider: ^6.1.2
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5
  cached_network_image: ^3.4.1
  pdf: ^3.11.1
  printing: ^5.13.4
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  web:
    generate: false
